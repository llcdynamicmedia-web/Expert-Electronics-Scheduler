<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expert Electronics — Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1a5fb4;
    --blue-light: #dce8f8;
    --blue-mid: #4a90d9;
    --green: #1c7a4a;
    --green-light: #d6f0e2;
    --amber: #a05c00;
    --amber-light: #fdecd0;
    --red: #b52b2b;
    --red-light: #fde0e0;
    --gray: #5a5a5a;
    --gray-light: #f0eeeb;
    --border: #ddd8d0;
    --bg: #f7f5f2;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6560;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    background: var(--blue);
    color: white;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .topbar-logo {
    background: rgba(255,255,255,0.2);
    border-radius: var(--radius-sm);
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px; letter-spacing: 0.02em;
  }
  .topbar h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar-sub { font-size: 12px; opacity: 0.7; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-info { font-size: 12px; opacity: 0.8; font-family: 'DM Mono', monospace; }

  /* MAIN LAYOUT */
  .main { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 56px); }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    .calendar { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .topbar h1 { font-size: 14px; }
    .topbar-sub { display: none; }
    .content { padding: 12px; }
    .sidebar { padding: 12px; }
    .appt-card { flex-wrap: wrap; }
    .appt-actions { width: 100%; justify-content: flex-end; margin-top: 8px; }
    .filter-btns { flex-wrap: wrap; }
    .week-title { font-size: 13px; }
    .stats { grid-template-columns: repeat(4, 1fr); }
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* STATS */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 12px;
    border: 1px solid var(--border);
  }
  .stat .num { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; }
  .stat .lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* FORM */
  .form-section {}
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 12px;
  }
  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.15s;
    outline: none;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--blue-mid); background: white; }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .btn-add {
    width: 100%;
    padding: 10px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-add:hover { background: #1550a0; }

  .btn-clear {
    width: 100%;
    padding: 8px;
    background: none;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.15s;
  }
  .btn-clear:hover { background: var(--bg); }

  /* MAIN CONTENT */
  .content { padding: 20px; overflow-y: auto; }

  /* WEEK NAV */
  .week-nav {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .week-nav-btn {
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    transition: background 0.15s;
  }
  .week-nav-btn:hover { background: var(--blue-light); border-color: var(--blue-mid); }
  .week-nav-btn.today-btn { background: var(--blue); color: white; border-color: var(--blue); }
  .week-nav-btn.today-btn:hover { background: #1550a0; }
  .week-title { flex: 1; font-size: 15px; font-weight: 600; color: var(--text); text-align: center; }

  /* CALENDAR GRID */
  .calendar {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 28px;
  }

  .day-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    min-height: 140px;
  }
  .day-col.is-today { border-color: var(--blue); border-width: 2px; }
  .day-col.is-past { opacity: 0.65; }

  .day-header { text-align: center; margin-bottom: 8px; }
  .day-name { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .day-num {
    font-size: 20px; font-weight: 600; color: var(--text);
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 2px auto 0;
  }
  .is-today .day-num { background: var(--blue); color: white; }

  .day-appts { display: flex; flex-direction: column; gap: 5px; }
  .day-empty { font-size: 11px; color: var(--text-muted); text-align: center; padding: 10px 0; opacity: 0.6; }

  .appt-chip {
    border-radius: var(--radius-sm);
    padding: 5px 7px;
    cursor: pointer;
    transition: opacity 0.15s;
    border: 1px solid transparent;
  }
  .appt-chip:hover { opacity: 0.85; }
  .appt-chip.s-scheduled { background: var(--blue-light); border-color: #b8d4f0; }
  .appt-chip.s-inprogress { background: var(--green-light); border-color: #a8dfc2; }
  .appt-chip.s-done { background: var(--gray-light); border-color: var(--border); }

  .chip-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip-svc { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .chip-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle;
  }
  .s-scheduled .chip-dot { background: var(--blue); }
  .s-inprogress .chip-dot { background: var(--green); }
  .s-done .chip-dot { background: #aaa; }

  /* UPCOMING LIST */
  .list-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .list-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .filter-btns { display: flex; gap: 6px; }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

  .appt-list { display: flex; flex-direction: column; gap: 8px; }

  .appt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color 0.15s;
  }
  .appt-card:hover { border-color: #bbb; }
  .appt-card.s-inprogress { border-left: 3px solid var(--green); }
  .appt-card.s-scheduled { border-left: 3px solid var(--blue); }
  .appt-card.s-done { border-left: 3px solid #bbb; opacity: 0.75; }

  .appt-date-col { text-align: center; min-width: 44px; }
  .appt-date-col .d-day { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .appt-date-col .d-num { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.1; }
  .appt-date-col .d-mon { font-size: 11px; color: var(--text-muted); }

  .appt-divider { width: 1px; background: var(--border); align-self: stretch; }

  .appt-body { flex: 1; }
  .appt-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .appt-name-line { font-size: 15px; font-weight: 600; color: var(--text); }
  .appt-vehicle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .appt-service { font-size: 13px; color: var(--text); margin-top: 4px; }
  .appt-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500; padding: 2px 8px;
    border-radius: 99px; border: 1px solid transparent;
  }
  .badge-scheduled { background: var(--blue-light); color: var(--blue); border-color: #b8d4f0; }
  .badge-inprogress { background: var(--green-light); color: var(--green); border-color: #a8dfc2; }
  .badge-done { background: var(--gray-light); color: var(--gray); border-color: var(--border); }
  .badge-me { background: var(--blue-light); color: var(--blue); border-color: #b8d4f0; }
  .badge-other { background: var(--green-light); color: var(--green); border-color: #a8dfc2; }

  .appt-phone { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .appt-notes { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 4px; }

  .appt-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-action {
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .btn-action:hover { background: var(--bg); color: var(--text); }
  .btn-action.progress { color: var(--green); border-color: var(--green); }
  .btn-action.progress:hover { background: var(--green-light); }
  .btn-action.complete { color: var(--gray); border-color: #bbb; }
  .btn-action.complete:hover { background: var(--gray-light); }
  .btn-action.remove { color: var(--red); border-color: var(--red-light); }
  .btn-action.remove:hover { background: var(--red-light); }

  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text-muted); font-size: 14px;
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty-state .e-icon { font-size: 32px; margin-bottom: 10px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1a1a1a; color: white;
    padding: 10px 20px; border-radius: 99px;
    font-size: 13px; font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 999; pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .saved-indicator {
    font-size: 11px; color: rgba(255,255,255,0.7);
    font-family: 'DM Mono', monospace;
  }

  @media print {
    .topbar, .sidebar, .week-nav, .filter-btns, .appt-actions { display: none !important; }
    .main { grid-template-columns: 1fr; }
    .content { padding: 0; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">EE</div>
    <div>
      <div class="topbar h1" style="font-size:16px;font-weight:600;">Expert Electronics</div>
      <div class="topbar-sub">9924 N 2nd St, Machesney Park &mdash; (815) 378-3296</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="saved-indicator" id="saved-ind">All changes saved</span>
  </div>
</div>

<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
  <button onclick="toggleSidebar()" id="sidebar-toggle" style="display:none;width:100%;padding:10px;background:var(--blue);color:white;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;">+ New appointment</button>
  <div id="sidebar-content">
    <div>
      <div class="section-label">Overview</div>
      <div class="stats" id="stats"></div>
    </div>

    <div class="form-section">
      <div class="section-label">Add appointment</div>

      <div class="form-row-2">
        <div class="form-group"><label>Customer name *</label><input id="f-name" type="text" placeholder="Full name" /></div>
        <div class="form-group"><label>Phone</label><input id="f-phone" type="text" placeholder="(815) 000-0000" /></div>
      </div>
      <div class="form-group"><label>Vehicle *</label><input id="f-vehicle" type="text" placeholder="Year, make, model" /></div>
      <div class="form-group"><label>Service *</label><input id="f-service" type="text" placeholder="e.g. remote start, stereo install" /></div>
      <div class="form-row-2">
        <div class="form-group"><label>Date *</label><input id="f-date" type="date" /></div>
        <div class="form-group"><label>Assigned to</label>
          <select id="f-installer">
            <option value="Adam">Adam</option>
            <option value="Nick">Nick</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="f-notes" placeholder="Parts needed, special instructions..."></textarea></div>

      <button class="btn-add" onclick="saveAppt()">+ Add appointment</button>
      <button class="btn-clear" onclick="clearForm()">Clear form</button>
    </div>
  </div>
  </aside>

  <!-- CONTENT -->
  <div class="content">

    <!-- Week nav -->
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)">&#8592; Prev</button>
      <button class="week-nav-btn today-btn" onclick="goToday()">Today</button>
      <span class="week-title" id="week-title"></span>
      <button class="week-nav-btn" onclick="changeWeek(1)">Next &#8594;</button>
    </div>

    <!-- Calendar -->
    <div class="calendar" id="calendar"></div>

    <!-- List -->
    <div class="list-header">
      <div class="list-title">Appointment list</div>
      <div class="filter-btns">
        <button class="filter-btn active" onclick="setFilter('upcoming', this)">Upcoming</button>
        <button class="filter-btn" onclick="setFilter('inprogress', this)">In progress</button>
        <button class="filter-btn" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
      </div>
    </div>
    <div class="appt-list" id="appt-list"></div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let appts = [];
  let weekOffset = 0;
  let currentFilter = 'upcoming';

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyE0JL4J61OHRe5-ZQA9YwfLxT6yUMeqtrGFUS5BPXuaxJgsnFBc00JTE_Mt_M3vh7bzg/exec';

  function setStatus(msg, state) {
    const ind = document.getElementById('saved-ind');
    ind.textContent = msg;
    ind.style.color = state === 'error' ? '#ffaaaa' : state === 'saving' ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.8)';
  }

  function load() {
    return new Promise((resolve) => {
      setStatus('Loading...', 'saving');
      const cbName = 'cb_' + Date.now();
      const script = document.createElement('script');
      window[cbName] = function(data) {
        delete window[cbName];
        document.body.removeChild(script);
        appts = Array.isArray(data) ? data : [];
        setStatus('Synced ' + new Date().toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'}), 'ok');
        resolve();
      };
      script.onerror = function() {
        delete window[cbName];
        try { document.body.removeChild(script); } catch(e) {}
        setStatus('Could not reach Google Sheets', 'error');
        resolve();
      };
      script.src = SCRIPT_URL + '?callback=' + cbName + '&t=' + Date.now();
      document.body.appendChild(script);
      setTimeout(() => {
        if (window[cbName]) {
          window[cbName]([]);
          setStatus('Connection timed out', 'error');
        }
      }, 10000);
    });
  }

  async function save() {
    setStatus('Saving...', 'saving');
    try {
      const form = new FormData();
      form.append('payload', JSON.stringify({ action: 'save', appointments: appts }));
      await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: form });
      setStatus('Saved ' + new Date().toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'}), 'ok');
    } catch(e) {
      setStatus('Save failed — check connection', 'error');
    }
  }

  function todayStr() {
    return new Date().toISOString().split('T')[0];
  }

  function parseDate(s) {
    if (!s) return new Date();
    const str = String(s).trim().split('T')[0];
    const parts = str.split('-');
    if (parts.length === 3) return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    return new Date(str);
  }

  function fmtShort(s) {
    return parseDate(s).toLocaleDateString('en-US', {month:'short', day:'numeric'});
  }

  function getWeekDays() {
    const today = new Date();
    today.setHours(0,0,0,0);
    const dow = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1) + weekOffset * 6);
    const days = [];
    for (let i = 0; i < 6; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      days.push(d);
    }
    return days;
  }

  function renderStats() {
    const t = todayStr();
    const todayCount = appts.filter(a => a.date === t).length;
    const upcoming = appts.filter(a => a.date >= t && a.status !== 'done').length;
    const inprog = appts.filter(a => a.status === 'inprogress').length;
    const total = appts.length;
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="num">${todayCount}</div><div class="lbl">Today</div></div>
      <div class="stat"><div class="num">${upcoming}</div><div class="lbl">Upcoming</div></div>
      <div class="stat"><div class="num">${inprog}</div><div class="lbl">In progress</div></div>
      <div class="stat"><div class="num">${total}</div><div class="lbl">All time</div></div>
    `;
  }

  function renderCalendar() {
    const days = getWeekDays();
    const t = todayStr();
    const start = days[0].toLocaleDateString('en-US', {month:'short', day:'numeric'});
    const end = days[days.length-1].toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    document.getElementById('week-title').textContent = start + ' – ' + end;

    let html = '';
    days.forEach(d => {
      const ds = d.toISOString().split('T')[0];
      const isToday = ds === t;
      const isPast = ds < t;
      const dayAppts = appts.filter(a => a.date === ds).sort((a,b) => a.name.localeCompare(b.name));
      html += `<div class="day-col${isToday?' is-today':''}${isPast?' is-past':''}">
        <div class="day-header">
          <div class="day-name">${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
          <div class="day-num">${d.getDate()}</div>
        </div>
        <div class="day-appts">`;
      if (dayAppts.length === 0) {
        html += `<div class="day-empty">Open</div>`;
      } else {
        dayAppts.forEach(a => {
          html += `<div class="appt-chip s-${a.status}" onclick="cycleStatus('${a.id}')" title="${a.name} — ${a.service}\nClick to update status">
            <div class="chip-name"><span class="chip-dot"></span>${a.name}</div>
            <div class="chip-svc">${a.service}</div>
          </div>`;
        });
      }
      html += `</div></div>`;
    });
    document.getElementById('calendar').innerHTML = html;
  }

  function renderList() {
    const t = todayStr();
    let filtered = [...appts];
    if (currentFilter === 'upcoming') filtered = appts.filter(a => a.date >= t && a.status !== 'done');
    else if (currentFilter === 'inprogress') filtered = appts.filter(a => a.status === 'inprogress');
    else if (currentFilter === 'done') filtered = appts.filter(a => a.status === 'done');
    filtered.sort((a,b) => a.date.localeCompare(b.date) || a.name.localeCompare(b.name));

    if (filtered.length === 0) {
      document.getElementById('appt-list').innerHTML = `<div class="empty-state"><div class="e-icon">&#128197;</div>No appointments here yet.</div>`;
      return;
    }

    document.getElementById('appt-list').innerHTML = filtered.map(a => {
      const d = parseDate(a.date);
      const dayName = d.toLocaleDateString('en-US', {weekday:'short'});
      const dayNum = d.getDate();
      const mon = d.toLocaleDateString('en-US', {month:'short'});
      const statusLabel = a.status === 'scheduled' ? 'Scheduled' : a.status === 'inprogress' ? 'In progress' : 'Done';
      const nextAction = a.status === 'scheduled'
        ? `<button class="btn-action progress" onclick="cycleStatus('${a.id}')">Start</button>`
        : a.status === 'inprogress'
        ? `<button class="btn-action complete" onclick="cycleStatus('${a.id}')">Mark done</button>`
        : `<button class="btn-action" onclick="cycleStatus('${a.id}')">Reopen</button>`;
      return `<div class="appt-card s-${a.status}">
        <div class="appt-date-col">
          <div class="d-day">${dayName}</div>
          <div class="d-num">${dayNum}</div>
          <div class="d-mon">${mon}</div>
        </div>
        <div class="appt-divider"></div>
        <div class="appt-body">
          <div class="appt-top">
            <div>
              <div class="appt-name-line">${a.name}</div>
              <div class="appt-vehicle">${a.vehicle || '—'}</div>
              <div class="appt-service">${a.service}</div>
            </div>
          </div>
          <div class="appt-meta">
            <span class="badge badge-${a.status}">${statusLabel}</span>
            <span class="badge ${a.installer === 'Adam' ? 'badge-me' : 'badge-other'}">${a.installer}</span>
            <span style="font-size:11px;color:var(--text-muted);">9:00am drop-off</span>
          </div>
          ${a.phone ? `<div class="appt-phone" style="margin-top:6px;">${a.phone}</div>` : ''}
          ${a.notes ? `<div class="appt-notes">${a.notes}</div>` : ''}
        </div>
        <div class="appt-actions">
          ${nextAction}
          <button class="btn-action remove" onclick="deleteAppt('${a.id}')">Remove</button>
        </div>
      </div>`;
    }).join('');
  }

  function render() { renderStats(); renderCalendar(); renderList(); }

  function saveAppt() {
    const name = document.getElementById('f-name').value.trim();
    const vehicle = document.getElementById('f-vehicle').value.trim();
    const service = document.getElementById('f-service').value.trim();
    const date = document.getElementById('f-date').value;
    if (!name || !date) { showToast('Name and date are required.'); return; }
    appts.push({
      id: Date.now().toString() + Math.random().toString(36).slice(2,6),
      name,
      phone: document.getElementById('f-phone').value.trim(),
      vehicle,
      service: service || 'Service TBD',
      date,
      installer: document.getElementById('f-installer').value,
      notes: document.getElementById('f-notes').value.trim(),
      status: 'scheduled',
      created: new Date().toISOString()
    });
    save();
    clearForm();
    render();
    showToast('Appointment added for ' + name);
  }

  function clearForm() {
    ['f-name','f-phone','f-vehicle','f-service','f-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-installer').value = 'Adam';
    document.getElementById('f-date').value = todayStr();
  }

  function cycleStatus(id) {
    const a = appts.find(x => x.id === id);
    if (!a) return;
    const prev = a.status;
    if (a.status === 'scheduled') a.status = 'inprogress';
    else if (a.status === 'inprogress') a.status = 'done';
    else a.status = 'scheduled';
    save(); render();
    const labels = {scheduled:'Scheduled', inprogress:'In progress', done:'Done'};
    showToast(a.name + ' → ' + labels[a.status]);
  }

  function deleteAppt(id) {
    const a = appts.find(x => x.id === id);
    if (!a) return;
    if (!confirm('Remove appointment for ' + a.name + ' on ' + fmtShort(a.date) + '?')) return;
    appts = appts.filter(x => x.id !== id);
    save(); render();
    showToast('Appointment removed.');
  }

  function changeWeek(dir) { weekOffset += dir; renderCalendar(); }
  function goToday() { weekOffset = 0; renderCalendar(); }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  document.getElementById('f-date').value = todayStr();
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.closest('.sidebar')) saveAppt();
  });

  async function init() {
    await load();
    render();
    setInterval(async () => {
      await load();
      render();
    }, 30000);
  }

  init();

  function toggleSidebar() {
    const content = document.getElementById('sidebar-content');
    const btn = document.getElementById('sidebar-toggle');
    const visible = content.style.display !== 'none';
    content.style.display = visible ? 'none' : 'block';
    btn.textContent = visible ? '+ New appointment' : 'Hide form';
  }

  function checkMobile() {
    const toggle = document.getElementById('sidebar-toggle');
    const content = document.getElementById('sidebar-content');
    if (window.innerWidth <= 768) {
      toggle.style.display = 'block';
      content.style.display = 'none';
    } else {
      toggle.style.display = 'none';
      content.style.display = 'block';
    }
  }

  checkMobile();
  window.addEventListener('resize', checkMobile);
</script>
</body>
</html>
