<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expert Electronics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:#b52b2b; --red-light:#fde0e0; --red-dark:#8a1f1f;
  --green:#1c7a4a; --green-light:#d6f0e2;
  --amber:#a05c00; --amber-light:#fdecd0;
  --yellow:#b58a00; --yellow-light:#fff8d6;
  --border:#ddd8d0; --bg:#f7f5f2; --surface:#fff;
  --text:#1a1a1a; --muted:#6b6560;
  --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

/* TOPBAR */
.topbar{background:#1a1a1a;color:white;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-left img{height:38px;width:auto;display:block;}
.topbar-sub{font-size:11px;opacity:0.6;}
.saved-ind{font-size:11px;opacity:0.85;font-family:'DM Mono',monospace;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 56px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:calc(100vh - 56px);}
.sec-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.content{padding:14px;overflow-y:auto;}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat{background:var(--bg);border-radius:var(--radius-sm);padding:10px;border:1px solid var(--border);}
.stat .num{font-size:22px;font-weight:600;line-height:1;}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.04em;}

/* FORM */
.form-group{margin-bottom:8px;}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px;font-weight:500;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;background:var(--bg);color:var(--text);transition:border-color 0.15s;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--red);background:white;}
.form-group textarea{resize:vertical;min-height:52px;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.svc-templates{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.svc-pill{padding:3px 8px;border-radius:99px;border:1px solid var(--border);background:none;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--muted);cursor:pointer;transition:all 0.12s;}
.svc-pill:hover{border-color:var(--red);color:var(--red);background:var(--red-light);}
.btn-add{width:100%;padding:9px;background:var(--red);color:white;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-add:hover{background:var(--red-dark);}
.btn-clear{width:100%;padding:6px;background:none;color:var(--muted);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:5px;}
.btn-clear:hover{background:var(--bg);}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.wnav-btn{padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);}
.wnav-btn:hover{background:var(--red-light);}
.wnav-btn.today{background:var(--red);color:white;border-color:var(--red);}
.week-title{flex:1;font-size:13px;font-weight:600;text-align:center;}

/* CALENDAR - chip-based simple view */
.calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin-bottom:20px;}
.day-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px;min-height:100px;}
.day-col.is-today{border-color:var(--red);border-width:2px;}
.day-col.is-past{opacity:0.6;}
.day-head{text-align:center;margin-bottom:6px;}
.day-name{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;}
.day-num{font-size:17px;font-weight:600;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto 0;}
.is-today .day-num{background:var(--red);color:white;}
.day-empty{font-size:11px;color:var(--muted);text-align:center;padding:8px 0;opacity:0.5;}
.day-appts{display:flex;flex-direction:row;flex-wrap:wrap;gap:3px;}
.chip{border-radius:var(--radius-sm);padding:5px 7px;cursor:pointer;border:1px solid transparent;flex:1;min-width:80px;}
.chip:hover{opacity:0.85;}
/* Adam chips - red tones */
.chip.adam-scheduled{background:#dce8f8;border-color:#b8d4f0;}
.chip.adam-inprogress{background:#ccfbf1;border-color:#2dd4bf;}
.chip.adam-done{background:#d1fae5;border-color:#6ee7b7;opacity:0.85;}
/* Nick chips - purple tones */
.chip.nick-scheduled{background:#fef3c7;border-color:#d97706;}
.chip.nick-inprogress{background:#ccfbf1;border-color:#2dd4bf;}
.chip.nick-done{background:#d1fae5;border-color:#6ee7b7;opacity:0.85;}
.chip-installer{display:inline-block;font-size:9px;padding:1px 5px;border-radius:99px;margin-bottom:3px;font-weight:600;}
.chip-adam-label{background:#dce8f8;color:#1a5fb4;}
.chip-nick-label{background:#fef3c7;color:#92400e;}
.chip-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chip-svc{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* APPOINTMENT LIST */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.list-title{font-size:15px;font-weight:600;}
.filter-btns{display:flex;gap:4px;flex-wrap:wrap;}
.fbtn{padding:4px 11px;border-radius:99px;border:1px solid var(--border);background:none;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;}
.fbtn.active{background:var(--red);color:white;border-color:var(--red);}
.appt-list{display:flex;flex-direction:column;gap:7px;}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;display:flex;gap:11px;align-items:flex-start;}
.acard.s-scheduled{border-left:3px solid var(--red);}
.acard.s-inprogress{border-left:3px solid #0d9488;}
.acard.s-done{border-left:3px solid var(--green);background:#f0faf5;}
.adate{text-align:center;min-width:38px;}
.adate .dd{font-size:10px;color:var(--muted);text-transform:uppercase;}
.adate .dn{font-size:19px;font-weight:600;line-height:1.1;}
.adate .dm{font-size:10px;color:var(--muted);}
.adiv{width:1px;background:var(--border);align-self:stretch;}
.abody{flex:1;min-width:0;}
.aname{font-size:14px;font-weight:600;}
.aveh{font-size:12px;color:var(--muted);margin-top:1px;}
.asvc{font-size:13px;margin-top:3px;}
.ameta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 7px;border-radius:99px;border:1px solid transparent;}
.badge-scheduled{background:var(--red-light);color:var(--red);border-color:#f0b8b8;}
.badge-inprogress{background:#ccfbf1;color:#0f766e;border-color:#2dd4bf;}
.badge-done{background:var(--green-light);color:var(--green);border-color:#a8dfc2;}
.badge-adam{background:#dce8f8;color:#1a5fb4;border-color:#b8d4f0;}
.badge-nick{background:#fef3c7;color:#92400e;border-color:#d97706;}
.aphone a{font-size:11px;color:var(--red);font-family:'DM Mono',monospace;text-decoration:none;margin-top:4px;display:inline-block;}
.aphone a:hover{text-decoration:underline;}
.anotes{font-size:11px;color:var(--muted);font-style:italic;margin-top:3px;}
.aactions{display:flex;gap:4px;flex-shrink:0;flex-direction:column;}
.abtn{padding:5px 9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;}
.abtn:hover{background:var(--bg);}
.abtn.go{color:var(--green);border-color:var(--green);}
.abtn.go:hover{background:var(--green-light);}
.abtn.edit{color:var(--amber);border-color:#f0c060;}
.abtn.edit:hover{background:var(--amber-light);}
.abtn.rm{color:var(--red);border-color:#f0c0c0;}
.abtn.rm:hover{background:var(--red-light);}
.empty{text-align:center;padding:32px 20px;color:var(--muted);background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);}

/* EDIT MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--surface);border-radius:var(--radius);padding:20px;width:90%;max-width:460px;max-height:90vh;overflow-y:auto;}
.modal-box h3{font-size:16px;font-weight:600;margin-bottom:14px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.btn-save{padding:8px 18px;background:var(--red);color:white;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-cancel{padding:8px 14px;background:none;color:var(--muted);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}

/* MOBILE FAB */
.fab{display:none;position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--red);color:white;border:none;font-size:28px;cursor:pointer;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.25);align-items:center;justify-content:center;}
/* MOBILE ADD MODAL */
.add-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;}
.add-modal-bg.open{display:flex;}
.add-modal-sheet{background:var(--surface);width:100%;max-width:600px;border-radius:16px 16px 0 0;padding:18px;max-height:92vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-header h3{font-size:16px;font-weight:600;}
.modal-close{padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:white;padding:9px 18px;border-radius:99px;font-size:13px;font-weight:500;transition:transform 0.3s;z-index:999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:760px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .fab{display:flex;}
  .calendar{grid-template-columns:repeat(4,minmax(0,1fr));}
  .week-title{font-size:12px;}
  .topbar-sub{display:none;}
  .aactions{flex-direction:row;}
  .content{padding-bottom:80px;}
}
@media(max-width:480px){.form-row-2{grid-template-columns:1fr;}}
</style>
</head>

<script>
/* ===================================================
   CONFIG
   Set SHEETS_ENABLED = true and paste your SCRIPT_URL
   once Google Sheets is set up. Until then all data
   is saved to localStorage in this browser only.
   =================================================== */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyE0JL4J61OHRe5-ZQA9YwfLxT6yUMeqtrGFUS5BPXuaxJgsnFBc00JTE_Mt_M3vh7bzg/exec';
const SHEETS_ENABLED = true; /* set to false to use localStorage only */
const LS_KEY = 'ee_appts_v3';
const TECHS = ['Adam','Nick'];
const SVC_TEMPLATES = [
  {label:'Remote start', value:'Remote start install', hours:1.5},
  {label:'Radio',        value:'Radio/stereo install', hours:1.5},
  {label:'Door speakers',value:'Door speaker install', hours:1},
  {label:'Components',   value:'Component speaker install', hours:2},
  {label:'Sub install',  value:'Subwoofer install', hours:3.5},
  {label:'4-channel',    value:'4-channel amplifier install', hours:3.5},
  {label:'Full audio',   value:'Full audio build', hours:6},
  {label:'Dash cam',     value:'Dash cam install', hours:2},
  {label:'Radar',        value:'Radar detector install', hours:1.5},
  {label:'Backup cam',   value:'Backup camera install', hours:1},
  {label:'Window tint',  value:'Window tint', hours:2},
  {label:'Intoxalock',   value:'Intoxalock install', hours:2},
];

/* ===================================================
   STATE
   =================================================== */
let appts = [];
let weekOffset = 0;
let currentFilter = 'upcoming';
let isSaving = false;
let lastSaveTime = 0;
let editingId = null;

/* ===================================================
   DATE HELPERS
   All dates stored and compared as "YYYY-MM-DD" strings.
   ALWAYS use localDateStr() — never toISOString() which gives UTC.
   =================================================== */
function localDateStr(d) {
  /* Returns local YYYY-MM-DD for any Date object */
  const dt = d || new Date();
  return dt.getFullYear() + '-' +
    String(dt.getMonth()+1).padStart(2,'0') + '-' +
    String(dt.getDate()).padStart(2,'0');
}
function todayStr() { return localDateStr(new Date()); }

function parseDate(s) {
  /* Safely parse YYYY-MM-DD into local midnight Date */
  if (!s) return new Date();
  const str = String(s).trim();
  /* Handle YYYY-MM-DD */
  const m = str.match(/^([0-9]{4})-([0-9]{2})-([0-9]{2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  /* Handle M/D/YYYY from Google Sheets */
  const m2 = str.match(/^([0-9]{1,2})\/([0-9]{1,2})\/([0-9]{4})/);
  if (m2) return new Date(+m2[3], +m2[1]-1, +m2[2]);
  return new Date(str);
}

function normalizeDate(s) {
  /* Convert any date format to YYYY-MM-DD */
  if (!s) return '';
  const str = String(s).trim();
  if (/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(str)) return str;
  return localDateStr(parseDate(str));
}

function timeToDecimal(t) {
  /* "9:00 AM" -> 9.0, "1:30 PM" -> 13.5 */
  if (!t) return 9;
  const parts = t.split(' ');
  const [h, mi] = parts[0].split(':').map(Number);
  const ampm = parts[1];
  let hour = h;
  if (ampm === 'PM' && h !== 12) hour += 12;
  if (ampm === 'AM' && h === 12) hour = 0;
  return hour + (mi || 0) / 60;
}

/* ===================================================
   WEEK NAVIGATION
   Mon-Sun, 7 days. weekOffset shifts by 7 days.
   =================================================== */
function getWeekDays() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const dow = today.getDay(); /* 0=Sun, 1=Mon ... 6=Sat */
  /* Days to subtract to get to Monday */
  const toMon = dow === 0 ? 6 : dow - 1;
  const monday = new Date(today);
  monday.setDate(today.getDate() - toMon + weekOffset * 7);
  return Array.from({length:7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

/* ===================================================
   OVERLAP VALIDATION
   Returns true if installer is already booked during [startH, endH)
   on the given date. Excludes the appointment with excludeId.
   =================================================== */
function hasOverlap(date, installer, startH, endH, excludeId) {
  return appts.some(a => {
    if (a.id === excludeId) return false;
    if (a.date !== date) return false;
    if ((a.installer || 'Adam') !== installer) return false;
    const aStart = timeToDecimal(a.time || '9:00 AM');
    const aEnd = aStart + (parseFloat(a.duration) || 1);
    /* Overlap if intervals intersect */
    return startH < aEnd && endH > aStart;
  });
}

/* ===================================================
   LOCAL STORAGE
   =================================================== */
function lsSave() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(appts)); } catch(e) {}
}
function lsLoad() {
  try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : []; } catch(e) { return []; }
}

/* ===================================================
   GOOGLE SHEETS: LOAD (JSONP)
   =================================================== */
function loadFromSheets() {
  return new Promise(resolve => {
    /* Skip sheets if disabled or recently saved */
    if (!SHEETS_ENABLED) { resolve(null); return; }
    if (isSaving || (Date.now() - lastSaveTime < 12000)) { resolve(null); return; }
    setStatus('Syncing...', 'saving');
    const cb = 'cb_' + Date.now();
    const s = document.createElement('script');
    window[cb] = data => {
      delete window[cb]; s.remove();
      resolve(Array.isArray(data) ? data : null);
    };
    s.onerror = () => { delete window[cb]; resolve(null); };
    s.src = SCRIPT_URL + '?callback=' + cb + '&t=' + Date.now();
    document.head.appendChild(s);
    setTimeout(() => { if (window[cb]) { delete window[cb]; resolve(null); } }, 8000);
  });
}

/* ===================================================
   MERGE LOGIC
   Merge sheets data with local cache.
   Local wins if its lastModified is newer.
   =================================================== */
function mergeData(sheetsData) {
  const local = lsLoad();

  /* No sheets data — keep whatever is in localStorage */
  if (!sheetsData || !SHEETS_ENABLED) {
    if (local.length > 0) appts = local;
    return;
  }

  /* Sheets returned empty but we have local data — trust local */
  if (sheetsData.length === 0 && local.length > 0) {
    appts = local;
    setStatus('Sheet empty — keeping local data', 'error');
    return;
  }

  /* Normalize dates from sheets */
  sheetsData.forEach(a => { a.date = normalizeDate(a.date); });

  /* Merge: local wins if newer (uses lastModified timestamp) */
  const localMap = {};
  local.forEach(a => { localMap[a.id] = a; });
  const merged = {};
  sheetsData.forEach(a => { merged[a.id] = a; });
  Object.values(localMap).forEach(a => {
    const lts = Number(a.lastModified) || 0;
    const sts = merged[a.id] ? Number(merged[a.id].lastModified) || 0 : -1;
    if (!merged[a.id] || lts > sts) merged[a.id] = a;
  });

  appts = Object.values(merged).filter(a => a.id && a.name && a.date);
  lsSave();
}

async function load() {
  const data = await loadFromSheets();
  mergeData(data);
  if (!SHEETS_ENABLED) setStatus('Local mode — data saved here only', 'ok');
  else if (data) setStatus('Synced ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}), 'ok');
  else setStatus('Offline — using local data', 'error');
}

/* ===================================================
   GOOGLE SHEETS: SAVE (no-cors POST)
   Also saves to localStorage immediately.
   =================================================== */
async function save() {
  isSaving = true;
  lastSaveTime = Date.now();
  lsSave(); /* instant local backup */
  setStatus('Saving...', 'saving');
  try {
    if (SHEETS_ENABLED) {
      const snap = JSON.parse(JSON.stringify(appts));
      const form = new FormData();
      form.append('payload', JSON.stringify({action:'save', appointments:snap}));
      await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:form});
    }
    setStatus('Saved ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}), 'ok');
  } catch(e) { setStatus('Saved locally (sheets offline)', 'error'); }
  setTimeout(() => { isSaving = false; }, 10000);
}

function setStatus(msg, state) {
  const el = document.getElementById('saved-ind');
  el.textContent = msg;
  el.style.color = state==='error'?'#ffaaaa':state==='saving'?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.9)';
}

function fmtPhone(el) {
  let v = el.value.replace(/[^0-9]/g,'').slice(0,10);
  if (v.length >= 7) v = '('+v.slice(0,3)+') '+v.slice(3,6)+'-'+v.slice(6);
  else if (v.length >= 4) v = '('+v.slice(0,3)+') '+v.slice(3);
  else if (v.length) v = '('+v;
  el.value = v;
}

function fillSvc(prefix, val, hrs) {
  document.getElementById(prefix+'service').value = val;
  const dur = document.getElementById(prefix+'duration');
  if (dur && hrs) dur.value = String(hrs);
}

/* ===================================================
   SAVE APPOINTMENT (new)
   Validates overlap before saving.
   =================================================== */
function saveAppt(prefix) {
  const name = document.getElementById(prefix+'name').value.trim();
  const phone = document.getElementById(prefix+'phone').value.trim();
  const date = document.getElementById(prefix+'date').value;
  if (!name || !date || !phone) { showToast('Name, phone and date required'); return; }

  const installer = document.getElementById(prefix+'installer').value;
  const time = document.getElementById(prefix+'time').value;
  const duration = parseFloat(document.getElementById(prefix+'duration').value) || 1;
  const startH = timeToDecimal(time);
  const endH = startH + duration;

  /* Check overlap for same installer same day */
  if (hasOverlap(date, installer, startH, endH, null)) {
    showToast(installer + ' already has a job at that time!');
    return;
  }

  appts.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    name, date, phone, time, installer, duration: String(duration),
    vehicle: document.getElementById(prefix+'vehicle').value.trim(),
    service: document.getElementById(prefix+'service').value.trim() || 'Service TBD',
    notes: document.getElementById(prefix+'notes').value.trim(),
    status: 'scheduled',
    created: new Date().toISOString(),
    lastModified: Date.now()
  });

  save(); clearForm(prefix);
  if (prefix === 'm-') closeAddModal();
  render();
  showToast('Appointment added!');
}

function clearForm_desk() { clearForm('d-'); }
function clearForm(prefix) {
  ['name','phone','vehicle','service','notes'].forEach(f => {
    const el = document.getElementById(prefix+f); if (el) el.value = '';
  });
  const d = document.getElementById(prefix+'date'); if (d) d.value = todayStr();
  const ins = document.getElementById(prefix+'installer'); if (ins) ins.value = 'Adam';
  const tm = document.getElementById(prefix+'time'); if (tm) tm.value = '9:00 AM';
  const dur = document.getElementById(prefix+'duration'); if (dur) dur.value = '1';
}

/* ===================================================
   EDIT APPOINTMENT
   Opens edit modal pre-filled with appointment data.
   =================================================== */
function openEditModal(id) {
  const a = appts.find(x => x.id === id);
  if (!a) return;
  editingId = id;

  document.getElementById('edit-form-body').innerHTML = `
    <div class="form-row-2">
      <div class="form-group"><label>Customer name *</label><input id="e-name" type="text" value="${a.name||''}"></div>
      <div class="form-group"><label>Phone *</label><input id="e-phone" type="tel" value="${a.phone||''}" oninput="fmtPhone(this)"></div>
    </div>
    <div class="form-group"><label>Vehicle</label><input id="e-vehicle" type="text" value="${a.vehicle||''}"></div>
    <div class="form-group"><label>Service</label><input id="e-service" type="text" value="${a.service||''}"></div>
    <div class="form-row-2">
      <div class="form-group"><label>Date *</label><input id="e-date" type="date" value="${a.date||''}"></div>
      <div class="form-group"><label>Drop-off time</label>
        <select id="e-time">
          ${['9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','1:00 PM','1:30 PM','2:00 PM','2:30 PM','3:00 PM','3:30 PM','4:00 PM','4:30 PM','5:00 PM']
            .map(t => `<option${t===a.time?' selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-group"><label>Assigned to</label>
        <select id="e-installer">
          <option${(a.installer||'Adam')==='Adam'?' selected':''}>Adam</option>
          <option${a.installer==='Nick'?' selected':''}>Nick</option>
        </select>
      </div>
      <div class="form-group"><label>Duration (hrs)</label>
        <select id="e-duration">
          ${['1','1.5','2','2.5','3','3.5','4','5','6','8']
            .map(v => `<option value="${v}"${v===String(a.duration||'1')?' selected':''}>${v} hr${v!=='1'?'s':''}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group"><label>Status</label>
      <select id="e-status">
        <option value="scheduled"${a.status==='scheduled'?' selected':''}>Scheduled</option>
        <option value="inprogress"${a.status==='inprogress'?' selected':''}>In progress</option>
        <option value="done"${a.status==='done'?' selected':''}>Done</option>
      </select>
    </div>
    <div class="form-group"><label>Notes / parts</label><textarea id="e-notes">${a.notes||''}</textarea></div>
  `;

  document.getElementById('edit-modal-bg').classList.add('open');
}

function closeEditModal() {
  document.getElementById('edit-modal-bg').classList.remove('open');
  editingId = null;
}

function saveEdit() {
  if (!editingId) return;
  const a = appts.find(x => x.id === editingId);
  if (!a) return;

  const name = document.getElementById('e-name').value.trim();
  const phone = document.getElementById('e-phone').value.trim();
  const date = document.getElementById('e-date').value;
  if (!name || !date || !phone) { showToast('Name, phone and date required'); return; }

  const installer = document.getElementById('e-installer').value;
  const time = document.getElementById('e-time').value;
  const duration = parseFloat(document.getElementById('e-duration').value) || 1;
  const startH = timeToDecimal(time);
  const endH = startH + duration;

  /* Check overlap — exclude current appointment */
  if (hasOverlap(date, installer, startH, endH, editingId)) {
    showToast(installer + ' already has a job at that time!');
    return;
  }

  /* Apply changes */
  a.name = name; a.phone = phone; a.date = date;
  a.vehicle = document.getElementById('e-vehicle').value.trim();
  a.service = document.getElementById('e-service').value.trim();
  a.time = time; a.installer = installer;
  a.duration = String(duration);
  a.status = document.getElementById('e-status').value;
  a.notes = document.getElementById('e-notes').value.trim();
  a.lastModified = Date.now();

  save(); closeEditModal(); render();
  showToast('Appointment updated!');
}

/* ===================================================
   STATUS CYCLE (click chip or Start/Done button)
   =================================================== */
function cycleStatus(id) {
  const a = appts.find(x => x.id === id);
  if (!a) return;
  a.status = a.status==='scheduled'?'inprogress':a.status==='inprogress'?'done':'scheduled';
  a.lastModified = Date.now();
  save(); render();
  showToast({scheduled:'Scheduled',inprogress:'In progress',done:'Done'}[a.status]);
}

function deleteAppt(id) {
  const a = appts.find(x => x.id === id);
  if (!a || !confirm('Remove appointment for ' + a.name + '?')) return;
  appts = appts.filter(x => x.id !== id);
  save(); render(); showToast('Removed.');
}

/* ===================================================
   RENDER: STATS
   =================================================== */
function renderStats() {
  const t = todayStr();
  const tod = appts.filter(a => a.date === t).length;
  const up = appts.filter(a => a.date >= t && a.status !== 'done').length;
  const ip = appts.filter(a => a.status === 'inprogress').length;
  const all = appts.length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${tod}</div><div class="lbl">Today</div></div>
    <div class="stat"><div class="num">${up}</div><div class="lbl">Upcoming</div></div>
    <div class="stat"><div class="num">${ip}</div><div class="lbl">In progress</div></div>
    <div class="stat"><div class="num">${all}</div><div class="lbl">All time</div></div>
  `;
}

/* ===================================================
   RENDER: CALENDAR
   Uses localDateStr() for day keys — no UTC drift.
   =================================================== */
function renderCalendar() {
  const days = getWeekDays();
  /* Use local date string for week title */
  document.getElementById('week-title').textContent =
    days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' – ' +
    days[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  const t = todayStr();
  document.getElementById('calendar').innerHTML = days.map(d => {
    /* KEY FIX: use localDateStr() not toISOString() */
    const ds = localDateStr(d);
    const isT = ds === t;
    const isP = ds < t;
    const dayAppts = appts.filter(a => a.date === ds);

    const dayEmpty = dayAppts.length === 0;
    const chipsHtml = dayEmpty
      ? '<div class="day-empty">Open</div>'
      : '<div class="day-appts">' + dayAppts.map(a => {
          const inst = (a.installer||'Adam').toLowerCase();
          const chipClass = inst + '-' + a.status;
          const labelClass = 'chip-' + inst + '-label';
          const time = a.time || '9:00 AM';
          const timeLabel = time === '9:00 AM' ? '' : time + ' &bull; ';
          return `<div class="chip ${chipClass}" onclick="cycleStatus('${a.id}')" title="${a.name} — ${a.service} (${a.installer||'Adam'})">
            <span class="chip-installer ${labelClass}">${a.installer||'Adam'}</span>
            <div class="chip-name">${a.name}</div>
            <div class="chip-svc">${timeLabel}${a.service}</div>
          </div>`;
        }).join('') + '</div>';

    return `<div class="day-col${isT?' is-today':''}${isP?' is-past':''}">
      <div class="day-head">
        <div class="day-name">${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
        <div class="day-num">${d.getDate()}</div>
      </div>
      ${chipsHtml}
    </div>`;
  }).join('');
}

/* ===================================================
   RENDER: APPOINTMENT LIST
   =================================================== */
function renderList() {
  const t = todayStr();
  let list = [...appts];
  if (currentFilter === 'upcoming') list = list.filter(a => a.date >= t && a.status !== 'done');
  else if (currentFilter === 'inprogress') list = list.filter(a => a.status === 'inprogress');
  else if (currentFilter === 'done') list = list.filter(a => a.status === 'done');
  list.sort((a,b) => a.date.localeCompare(b.date) || a.name.localeCompare(b.name));

  if (!list.length) {
    document.getElementById('appt-list').innerHTML = '<div class="empty">No appointments here.</div>';
    return;
  }

  const sl = {scheduled:'Scheduled', inprogress:'In progress', done:'Done'};
  document.getElementById('appt-list').innerHTML = list.map(a => {
    const d = parseDate(a.date);
    const instLower = (a.installer||'Adam').toLowerCase();
    const nb = a.status==='scheduled'
      ? `<button class="abtn go" onclick="cycleStatus('${a.id}')">Start</button>`
      : a.status==='inprogress'
      ? `<button class="abtn go" onclick="cycleStatus('${a.id}')">Done</button>`
      : `<button class="abtn" onclick="cycleStatus('${a.id}')">Reopen</button>`;
    return `<div class="acard s-${a.status}">
      <div class="adate">
        <div class="dd">${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
        <div class="dn">${d.getDate()}</div>
        <div class="dm">${d.toLocaleDateString('en-US',{month:'short'})}</div>
      </div>
      <div class="adiv"></div>
      <div class="abody">
        <div class="aname">${a.name}</div>
        <div class="aveh">${a.vehicle||'—'}</div>
        <div class="asvc">${a.service}</div>
        <div class="ameta">
          <span class="badge badge-${a.status}">${sl[a.status]||a.status}</span>
          <span class="badge badge-${instLower}">${a.installer||'Adam'}</span>
          <span style="font-size:11px;color:var(--muted);">${a.time||'9:00 AM'} drop-off${a.duration?' &bull; '+a.duration+'h':''}</span>
        </div>
        ${a.phone ? `<div class="aphone"><a href="tel:${a.phone.replace(/[^0-9]/g,'')}">${a.phone}</a></div>` : ''}
        ${a.notes ? `<div class="anotes">${a.notes}</div>` : ''}
      </div>
      <div class="aactions">
        ${nb}
        <button class="abtn edit" onclick="openEditModal('${a.id}')">Edit</button>
        <button class="abtn rm" onclick="deleteAppt('${a.id}')">Remove</button>
      </div>
    </div>`;
  }).join('');
}

function render() { renderStats(); renderCalendar(); renderList(); }

/* ===================================================
   NAVIGATION
   =================================================== */
function changeWeek(d) { weekOffset += d; renderCalendar(); }
function goToday() { weekOffset = 0; renderCalendar(); }
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

/* ===================================================
   MODALS
   =================================================== */
function openAddModal() { document.getElementById('add-modal-bg').classList.add('open'); }
function closeAddModal() { document.getElementById('add-modal-bg').classList.remove('open'); }
function handleAddOverlay(e) { if (e.target === document.getElementById('add-modal-bg')) closeAddModal(); }

/* ===================================================
   TOAST
   =================================================== */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

/* ===================================================
   INIT
   1. Show localStorage data instantly
   2. Merge from Google Sheets
   3. Auto-refresh every 90s
   =================================================== */
document.getElementById('desk-form').innerHTML = formHTML('d-');
document.getElementById('mobile-form').innerHTML = formHTML('m-');
/* Wire up submit buttons since onclick in template literal has quoting issues */
const ds = document.getElementById('d-submit');
if (ds) ds.onclick = () => saveAppt('d-');
const ms = document.getElementById('m-submit');
if (ms) ms.onclick = () => saveAppt('m-');

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.closest('.sidebar')) saveAppt('d-');
});

async function init() {
  /* Show cached data immediately so UI is instant */
  const cached = lsLoad();
  if (cached.length > 0) { appts = cached; render(); }

  /* Then sync from Google Sheets */
  await load();
  render();

  /* Auto-refresh every 90 seconds, skip if saving */
  setInterval(async () => {
    if (!isSaving) { await load(); render(); }
  }, 90000);
}
init();
</script>
