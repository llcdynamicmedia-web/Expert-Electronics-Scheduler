<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expert Electronics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #b52b2b;
  --blue-light: #fde0e0;
  --blue-mid: #d94a4a;
  --green: #1c7a4a;
  --green-light: #d6f0e2;
  --amber: #a05c00;
  --amber-light: #fdecd0;
  --red: #b52b2b;
  --red-light: #fde0e0;
  --gray: #5a5a5a;
  --gray-light: #f0eeeb;
  --border: #ddd8d0;
  --bg: #f7f5f2;
  --surface: #ffffff;
  --text: #1a1a1a;
  --text-muted: #6b6560;
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

.topbar {
  background: var(--blue); color: white; padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; position: sticky; top: 0; z-index: 50;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo { display: none; }
.topbar-title { font-size: 15px; font-weight: 600; }
.topbar-sub { font-size: 11px; opacity: 0.7; }
.saved-ind { font-size: 11px; opacity: 0.8; font-family: 'DM Mono', monospace; }

.layout { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 56px); }

.sidebar {
  background: var(--surface); border-right: 1px solid var(--border);
  padding: 16px; display: flex; flex-direction: column; gap: 16px;
}
.sec-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
}
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat { background: var(--bg); border-radius: var(--radius-sm); padding: 10px; border: 1px solid var(--border); }
.stat .num { font-size: 24px; font-weight: 600; line-height: 1; }
.stat .lbl { font-size: 11px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; }

.form-group { margin-bottom: 9px; }
.form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 3px; font-weight: 500; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
  font-size: 13px; background: var(--bg); color: var(--text);
  transition: border-color 0.15s; outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: #d94a4a; background: white;
}
.form-group textarea { resize: vertical; min-height: 56px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 480px) {
  .form-row-2 { grid-template-columns: 1fr; }
}
.btn-add {
  width: 100%; padding: 10px; background: var(--blue); color: white;
  border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
}
.btn-add:hover { background: #8a1f1f; }
.btn-clear {
  width: 100%; padding: 7px; background: none; color: var(--text-muted);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; margin-top: 6px;
}
.btn-clear:hover { background: var(--bg); }

.content { padding: 16px; overflow-y: auto; }

.week-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.wnav-btn {
  padding: 6px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: var(--text); transition: background 0.15s;
}
.wnav-btn:hover { background: var(--blue-light); }
.wnav-btn.today { background: var(--blue); color: white; border-color: var(--blue); }
.wnav-btn.today:hover { background: #8a1f1f; }
.week-title { flex: 1; font-size: 14px; font-weight: 600; text-align: center; }

.calendar { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 7px; margin-bottom: 24px; }
.day-col {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 9px; min-height: 120px;
}
.day-col.is-today { border-color: var(--blue); border-width: 2px; }
.day-col.is-past { opacity: 0.6; }
.day-head { text-align: center; margin-bottom: 7px; }
.day-name { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.day-num {
  font-size: 18px; font-weight: 600; width: 32px; height: 32px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 2px auto 0;
}
.is-today .day-num { background: var(--blue); color: white; }
.day-empty { font-size: 11px; color: var(--text-muted); text-align: center; padding: 8px 0; opacity: 0.5; }

.chip {
  border-radius: var(--radius-sm); padding: 5px 6px; margin-bottom: 4px;
  cursor: pointer; border: 1px solid transparent; transition: opacity 0.15s;
}
.chip:hover { opacity: 0.8; }
.chip.s-scheduled { background: var(--blue-light); border-color: #b8d4f0; }
.chip.s-inprogress { background: var(--green-light); border-color: #a8dfc2; }
.chip.s-done { background: var(--gray-light); border-color: var(--border); }
.chip-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip-svc { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.list-title { font-size: 15px; font-weight: 600; }
.filter-btns { display: flex; gap: 5px; flex-wrap: wrap; }
.fbtn {
  padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border);
  background: none; font-family: 'DM Sans', sans-serif; font-size: 12px;
  color: var(--text-muted); cursor: pointer; transition: all 0.15s;
}
.fbtn.active { background: var(--blue); color: white; border-color: var(--blue); }

.appt-list { display: flex; flex-direction: column; gap: 8px; }
.acard {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; gap: 12px; align-items: flex-start;
}
.acard.s-scheduled { border-left: 3px solid var(--blue); }
.acard.s-inprogress { border-left: 3px solid var(--green); }
.acard.s-done { border-left: 3px solid #bbb; opacity: 0.75; }
.adate { text-align: center; min-width: 40px; }
.adate .dd { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
.adate .dn { font-size: 20px; font-weight: 600; line-height: 1.1; }
.adate .dm { font-size: 10px; color: var(--text-muted); }
.adiv { width: 1px; background: var(--border); align-self: stretch; }
.abody { flex: 1; min-width: 0; }
.aname { font-size: 14px; font-weight: 600; }
.aveh { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.asvc { font-size: 13px; margin-top: 3px; }
.ameta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.badge {
  display: inline-flex; align-items: center; font-size: 11px; font-weight: 500;
  padding: 2px 8px; border-radius: 99px; border: 1px solid transparent;
}
.badge-scheduled { background: var(--blue-light); color: var(--blue); border-color: #b8d4f0; }
.badge-inprogress { background: var(--green-light); color: var(--green); border-color: #a8dfc2; }
.badge-done { background: var(--gray-light); color: var(--gray); border-color: var(--border); }
.badge-adam { background: var(--blue-light); color: var(--blue); border-color: #b8d4f0; }
.badge-nick { background: var(--green-light); color: var(--green); border-color: #a8dfc2; }
.aphone { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-top: 4px; }
.anotes { font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 3px; }
.aactions { display: flex; gap: 5px; flex-shrink: 0; flex-direction: column; }
.abtn {
  padding: 5px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: none; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.abtn:hover { background: var(--bg); }
.abtn.go { color: var(--green); border-color: var(--green); }
.abtn.go:hover { background: var(--green-light); }
.abtn.rm { color: var(--red); border-color: #f0c0c0; }
.abtn.rm:hover { background: var(--red-light); }

.empty { text-align: center; padding: 36px 20px; color: var(--text-muted); background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); }

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: #1a1a1a; color: white; padding: 9px 18px; border-radius: 99px;
  font-size: 13px; font-weight: 500; transition: transform 0.3s; z-index: 999; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* MOBILE FAB */
.fab {
  display: none;
  position: fixed; bottom: 20px; right: 20px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--blue); color: white; border: none;
  font-size: 28px; cursor: pointer; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  align-items: center; justify-content: center;
}

/* MOBILE MODAL */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 200;
  align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-sheet {
  background: var(--surface); width: 100%; max-width: 600px;
  border-radius: 16px 16px 0 0; padding: 20px;
  max-height: 90vh; overflow-y: auto;
}
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: none; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer;
}

@media (max-width: 760px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .fab { display: flex; }
  .calendar { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .week-title { font-size: 12px; }
  .topbar-sub { display: none; }
  .aactions { flex-direction: row; }
  .content { padding-bottom: 80px; }
  .modal-sheet .form-row-2 { grid-template-columns: 1fr; }
}
</style>
</head>

<div class="layout">
  <aside class="sidebar">
    <div>
      <div class="sec-label">Overview</div>
      <div class="stats" id="stats"></div>
    </div>
    <div>
      <div class="sec-label">Add appointment</div>
      <div id="desk-form"></div>
    </div>
  </aside>
  <div class="content">
    <div class="week-nav">
      <button class="wnav-btn" onclick="changeWeek(-1)">&#8592; Prev</button>
      <button class="wnav-btn today" onclick="goToday()">Today</button>
      <span class="week-title" id="week-title"></span>
      <button class="wnav-btn" onclick="changeWeek(1)">Next &#8594;</button>
    </div>
    <div class="calendar" id="calendar"></div>
    <div class="list-header">
      <div class="list-title">Appointments</div>
      <div class="filter-btns">
        <button class="fbtn active" onclick="setFilter('upcoming',this)">Upcoming</button>
        <button class="fbtn" onclick="setFilter('inprogress',this)">In progress</button>
        <button class="fbtn" onclick="setFilter('all',this)">All</button>
        <button class="fbtn" onclick="setFilter('done',this)">Done</button>
      </div>
    </div>
    <div class="appt-list" id="appt-list"></div>
  </div>
</div>

<button class="fab" onclick="openModal()">+</button>

  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3>New appointment</h3>
      <button class="modal-close" onclick="closeModal()">Close</button>
    </div>
    <div id="mobile-form"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyE0JL4J61OHRe5-ZQA9YwfLxT6yUMeqtrGFUS5BPXuaxJgsnFBc00JTE_Mt_M3vh7bzg/exec';

let appts = [];
let weekOffset = 0;
let currentFilter = 'upcoming';

function formHTML(prefix) {
  const t = todayStr();
  return `
    <div class="form-row-2">
      <div class="form-group"><label>Customer name *</label><input id="${prefix}name" type="text" placeholder="Full name"></div>
      <div class="form-group"><label>Phone *</label><input id="${prefix}phone" type="text" placeholder="(815) 000-0000"></div>
    </div>
    <div class="form-group"><label>Vehicle *</label><input id="${prefix}vehicle" type="text" placeholder="Year, make, model"></div>
    <div class="form-group"><label>Service *</label><input id="${prefix}service" type="text" placeholder="e.g. remote start, stereo install"></div>
    <div class="form-row-2">
      <div class="form-group"><label>Date *</label><input id="${prefix}date" type="date" value="${t}"></div>
      <div class="form-group"><label>Drop-off time *</label>
        <select id="${prefix}time">
          <option value="9:00 AM">9:00 AM</option>
          <option value="10:00 AM">10:00 AM</option>
          <option value="11:00 AM">11:00 AM</option>
          <option value="12:00 PM">12:00 PM</option>
          <option value="1:00 PM">1:00 PM</option>
          <option value="2:00 PM">2:00 PM</option>
          <option value="3:00 PM">3:00 PM</option>
          <option value="4:00 PM">4:00 PM</option>
          <option value="5:00 PM">5:00 PM</option>
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-group"><label>Assigned to</label>
        <select id="${prefix}installer">
          <option value="Adam">Adam</option>
          <option value="Nick">Nick</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="${prefix}notes" placeholder="Parts needed, instructions..."></textarea></div>
    <button class="btn-add" onclick="saveAppt('${prefix}')">+ Add appointment</button>
    ${prefix === 'd-' ? '<button class="btn-clear" onclick="clearForm(\'d-\')">Clear form</button>' : ''}
  `;
}

function setStatus(msg, state) {
  const el = document.getElementById('saved-ind');
  el.textContent = msg;
  el.style.color = state === 'error' ? '#ffaaaa' : state === 'saving' ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.9)';
}

function load() {
  return new Promise(resolve => {
    setStatus('Loading...', 'saving');
    const cb = 'cb_' + Date.now();
    const s = document.createElement('script');
    window[cb] = data => {
      appts = Array.isArray(data) ? data : [];
      setStatus('Synced ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}), 'ok');
      delete window[cb]; s.remove(); resolve();
    };
    s.onerror = () => {
      setStatus('Could not reach Google Sheets', 'error');
      appts = []; delete window[cb]; resolve();
    };
    s.src = SCRIPT_URL + '?callback=' + cb + '&t=' + Date.now();
    document.head.appendChild(s);
    setTimeout(() => { if (window[cb]) { setStatus('Timeout', 'error'); appts = []; delete window[cb]; resolve(); } }, 8000);
  });
}

async function save() {
  setStatus('Saving...', 'saving');
  try {
    const form = new FormData();
    form.append('payload', JSON.stringify({ action: 'save', appointments: appts }));
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: form });
    setStatus('Saved ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}), 'ok');
  } catch(e) {
    setStatus('Save failed', 'error');
  }
}

function todayStr() { return new Date().toISOString().split('T')[0]; }

function parseDate(s) {
  if (!s) return new Date();
  const p = String(s).trim().split('T')[0].split('-');
  if (p.length === 3) return new Date(+p[0], +p[1]-1, +p[2]);
  return new Date(s);
}

function getWeekDays() {
  const d = new Date(); d.setHours(0,0,0,0);
  const dow = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1) + weekOffset * 6);
  return Array.from({length:6}, (_,i) => { const x = new Date(mon); x.setDate(mon.getDate()+i); return x; });
}

function renderStats() {
  const t = todayStr();
  const tod = appts.filter(a => a.date === t).length;
  const up = appts.filter(a => a.date >= t && a.status !== 'done').length;
  const ip = appts.filter(a => a.status === 'inprogress').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${tod}</div><div class="lbl">Today</div></div>
    <div class="stat"><div class="num">${up}</div><div class="lbl">Upcoming</div></div>
    <div class="stat"><div class="num">${ip}</div><div class="lbl">In progress</div></div>
    <div class="stat"><div class="num">${appts.length}</div><div class="lbl">All time</div></div>
  `;
}

function renderCalendar() {
  const days = getWeekDays();
  const t = todayStr();
  document.getElementById('week-title').textContent =
    days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' – ' +
    days[5].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('calendar').innerHTML = days.map(d => {
    const ds = d.toISOString().split('T')[0];
    const isT = ds === t, isP = ds < t;
    const da = appts.filter(a => a.date === ds);
    return `<div class="day-col${isT?' is-today':''}${isP?' is-past':''}">
      <div class="day-head">
        <div class="day-name">${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
        <div class="day-num">${d.getDate()}</div>
      </div>
      ${da.length === 0 ? '<div class="day-empty">Open</div>' :
        da.map(a => `<div class="chip s-${a.status}" onclick="cycleStatus('${a.id}')" title="Click to update status">
          <div class="chip-name">${a.name}</div>
          <div class="chip-svc">${a.time || '9:00 AM'} &mdash; ${a.service}</div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

function renderList() {
  const t = todayStr();
  let list = [...appts];
  if (currentFilter === 'upcoming') list = list.filter(a => a.date >= t && a.status !== 'done');
  else if (currentFilter === 'inprogress') list = list.filter(a => a.status === 'inprogress');
  else if (currentFilter === 'done') list = list.filter(a => a.status === 'done');
  list.sort((a,b) => a.date.localeCompare(b.date) || a.name.localeCompare(b.name));
  if (!list.length) {
    document.getElementById('appt-list').innerHTML = '<div class="empty">No appointments here.</div>';
    return;
  }
  document.getElementById('appt-list').innerHTML = list.map(a => {
    const d = parseDate(a.date);
    const sl = {scheduled:'Scheduled', inprogress:'In progress', done:'Done'};
    const nb = a.status === 'scheduled'
      ? `<button class="abtn go" onclick="cycleStatus('${a.id}')">Start</button>`
      : a.status === 'inprogress'
      ? `<button class="abtn go" onclick="cycleStatus('${a.id}')">Done</button>`
      : `<button class="abtn" onclick="cycleStatus('${a.id}')">Reopen</button>`;
    return `<div class="acard s-${a.status}">
      <div class="adate">
        <div class="dd">${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
        <div class="dn">${d.getDate()}</div>
        <div class="dm">${d.toLocaleDateString('en-US',{month:'short'})}</div>
      </div>
      <div class="adiv"></div>
      <div class="abody">
        <div class="aname">${a.name}</div>
        <div class="aveh">${a.vehicle||'—'}</div>
        <div class="asvc">${a.service}</div>
        <div class="ameta">
          <span class="badge badge-${a.status}">${sl[a.status]}</span>
          <span class="badge badge-${(a.installer||'adam').toLowerCase()}">${a.installer||''}</span>
          <span style="font-size:11px;color:var(--text-muted);">${a.time || '9:00 AM'} drop-off</span>
        </div>
        ${a.phone ? `<div class="aphone">${a.phone}</div>` : ''}
        ${a.notes ? `<div class="anotes">${a.notes}</div>` : ''}
      </div>
      <div class="aactions">
        ${nb}
        <button class="abtn rm" onclick="deleteAppt('${a.id}')">Remove</button>
      </div>
    </div>`;
  }).join('');
}

function render() { renderStats(); renderCalendar(); renderList(); }

function saveAppt(prefix) {
  const name = document.getElementById(prefix+'name').value.trim();
  const phone = document.getElementById(prefix+'phone').value.trim();
  const date = document.getElementById(prefix+'date').value;
  const time = document.getElementById(prefix+'time').value;
  if (!name || !date || !phone) { showToast('Name, phone and date required'); return; }
  appts.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    name, date,
    time: document.getElementById(prefix+'time').value,
    phone: document.getElementById(prefix+'phone').value.trim(),
    vehicle: document.getElementById(prefix+'vehicle').value.trim(),
    service: document.getElementById(prefix+'service').value.trim() || 'Service TBD',
    installer: document.getElementById(prefix+'installer').value,
    notes: document.getElementById(prefix+'notes').value.trim(),
    status: 'scheduled',
    created: new Date().toISOString()
  });
  save(); clearForm(prefix);
  if (prefix === 'm-') closeModal();
  render();
  showToast('Appointment added!');
}

function clearForm(prefix) {
  ['name','phone','vehicle','service','notes'].forEach(f => {
    const el = document.getElementById(prefix+f);
    if (el) el.value = '';
  });
  const d = document.getElementById(prefix+'date');
  if (d) d.value = todayStr();
  const ins = document.getElementById(prefix+'installer');
  if (ins) ins.value = 'Adam';
  const tm = document.getElementById(prefix+'time');
  if (tm) tm.value = '9:00 AM';
}

function cycleStatus(id) {
  const a = appts.find(x => x.id === id);
  if (!a) return;
  a.status = a.status === 'scheduled' ? 'inprogress' : a.status === 'inprogress' ? 'done' : 'scheduled';
  save(); render();
  showToast({scheduled:'Scheduled',inprogress:'In progress',done:'Done'}[a.status]);
}

function deleteAppt(id) {
  const a = appts.find(x => x.id === id);
  if (!a || !confirm('Remove appointment for ' + a.name + '?')) return;
  appts = appts.filter(x => x.id !== id);
  save(); render(); showToast('Removed.');
}

function changeWeek(d) { weekOffset += d; renderCalendar(); }
function goToday() { weekOffset = 0; renderCalendar(); }
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function openModal() { document.getElementById('modal-bg').classList.add('open'); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

document.getElementById('desk-form').innerHTML = formHTML('d-');
document.getElementById('mobile-form').innerHTML = formHTML('m-');

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.closest('.sidebar')) saveAppt('d-');
});

async function init() {
  await load();
  render();
  setInterval(async () => { await load(); render(); }, 30000);
}
init();
</script>
</body>
</html>
